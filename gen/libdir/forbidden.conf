-arch AArch64
-nprocs 2
-size 6
# the generated file name is in format `Armv8-ext-forbidden********.litmus`,
# where `********` are 8 digit numbers.
-name Armv8-ext-forbidden
-fmt 8
# present value in hex
#-hexa
# If only want to generate cycles rather than litmus tests
#-cycleonly true

# If `-relax` is enabled, tests will be required to have a relaxation from the list specified as its argument.
#-relax {RELAX_LIST}


# let ca = fr | co
# let Exp-obs =
#   [Exp & M]; rf & ext; [Exp & M]
#   | [Exp & M]; ca & ext; [Exp & M]
-safe Rfe Fre Coe

#let Exp-haz-ob = [Exp & R]; (po & same-loc); [Exp & R]; (ca & ext); [Exp & W]
-safe [PosRR Fre]

#let lwfs = [Exp & M | Imp & Tag & R]; (po & same-loc); [Exp & W]
-safe Pos*W
-safe [Pos*R Amo.Swp] [Pos*R Amo.Cas] [Pos*R LxSx]

### Data and address dependance
# let data = [Exp & R]; (basic-dep; [DATA]; iico_data+; [Exp & W]) & ~same-instance
# let dob = data
-safe DpDatadW
# `DpDatasW` is stronger than `Pos*W`.
#-safe DpDatasW

# let addr = [Exp & R]; (basic-dep; [ADDR]; iico_data+; [Exp & M | Imp & Tag & R | Imp & TTD & R | HU | TLBI | DC.CVAU | IC.IVAU]) & ~same-instance
# let dob = addr
-safe DpAddrdR DpAddrdW DpAddrsR
# `DpAddrsW` is stronger than `Pos*W`.
#-safe DpAddrsW

# let ctrl = [Exp & R]; basic-dep; [BCC]; po
# let dob = ctrl; [Exp & W | HU | TLBI | DC.CVAU | IC]
-safe DpCtrldW
# `DpCtrlsW` is stronger than `Pos*W`.
#-safe DpCtrlsW
-safe [DpCtrldR Amo.Cas] [DpCtrldR Amo.Swp] [DpCtrldR LxSx]
#`[DpCtrlsR rmw]` is stronger than `Pos*W`.
#-safe [DpCtrlsR Amo.Cas] [DpCtrlsR Amo.Swp] [DpCtrlsR LxSx]

# let dob = addr; [Exp & M]; po; [Exp & W | HU]
-safe [DpAddrdW PodWW] [DpAddrsW PodWW] [DpAddrdR PodRW] [DpAddrsR PodRW]
# `[DpAddrsW PosWW] [DpAddrsR PosRW]` are stronger than `Pos*W` as the former are a read followed by a write to the same location.
#-safe [DpAddrsW PosWW] [DpAddrsR PosRW]
# `[DpAddrdW PosWW] [DpAddrdR PosRW]` can be combined by `diy`
#-safe [DpAddrdW PosWW] [DpAddrdR PosRW]
-safe [DpAddrdR Amo.Swp PodWW] [DpAddrsR Amo.Swp PodWW]
-safe [DpAddrdR Amo.Cas PodWW] [DpAddrsR Amo.Cas PodWW]
-safe [DpAddrdR LxSx PodWW] [DpAddrsR LxSx PodWW]
# `[DpAddrdR rmw PosWW]` can be combined by `diy` as `[DpAddrdR rmw]` and `PosWW`
-safe [DpAddrdW PodWR Amo.Swp] [DpAddrdW PosWR Amo.Swp] [DpAddrsW PodWR Amo.Swp] [DpAddrdR PodRR Amo.Swp] [DpAddrdR PosRR Amo.Swp] [DpAddrsR PodRR Amo.Swp]
-safe [DpAddrdW PodWR Amo.Cas] [DpAddrdW PosWR Amo.Cas] [DpAddrsW PodWR Amo.Cas] [DpAddrdR PodRR Amo.Cas] [DpAddrdR PosRR Amo.Cas] [DpAddrsR PodRR Amo.Cas]
-safe [DpAddrdW PodWR LxSx] [DpAddrdW PosWR LxSx] [DpAddrsW PodWR LxSx] [DpAddrdR PodRR LxSx] [DpAddrdR PosRR LxSx] [DpAddrsR PodRR LxSx]

# let dob = addr; [Exp & M]; lrs; [Exp & R | Imp & Tag & R]
# let lrs = [W]; ((po & same-loc) & ~(intervening(W,(po & same-loc)))); [R]
-safe [DpAddrdW PosWR] [DpAddrsW PosWR]
-safe [DpAddrdR Amo.Swp PosWR] [DpAddrsR Amo.Swp PosWR]
-safe [DpAddrdR Amo.Cas PosWR] [DpAddrsR Amo.Cas PosWR]
-safe [DpAddrdR LxSx PosWR] [DpAddrsR LxSx PosWR]

# let dob = data; [Exp & M]; lrs; [Exp & R | Imp & Tag & R]
# let lrs = [W]; ((po & same-loc) & ~(intervening(W,(po & same-loc)))); [R]
-safe [DpDatadW PosWR] [DpDatasW PosWR]

# let ctrl = [Exp & R]; basic-dep; [BCC]; po
# let IFB-ob = [Exp & R]; ctrl; [IFB]; po
# let IFB = ISB | EXC-ENTRY-IFB | EXC-RET-IFB
-safe [DpCtrldR ISB] [DpCtrldW ISB] [DpCtrlsR ISB]
# [DpCtrlsW ISB] is stronger than `Pos*W`
#-safe [DpCtrlsW ISB]

# let IFB-ob = [Exp & R]; pick-ctrl-dep; [IFB]; po
# let IFB = ISB | EXC-ENTRY-IFB | EXC-RET-IFB
-safe [DpCtrlCseldR ISB] [DpCtrlCseldW ISB] [DpCtrlCselsR ISB]
# [DpCtrlCselsW ISB] is stronger than `Pos*W`
#-safe [DpCtrlCselsW ISB]

# let IFB-ob = [Exp & R]; addr; [Exp & M]; po; [IFB]; po
-safe [DpAddrdR ISBdRR] [DpAddrdR ISBsRR] [DpAddrdW ISBdWR] [DpAddrsR ISBdRR] [DpAddrsR ISBsRR] [DpAddrsW ISBdWR]
# `[DpAddrsW ISBsWW] [DpAddrsR ISBsRW]` are stronger than `Pos*W` as the former are a read followed by a write to the same location.
#-safe [DpAddrsW ISBsWW] [DpAddrsR ISBsRW]
# `[DpAddr** ISB**W]` is stronger than `[DpAddr** Po**W]`; the latter can be combined by `diy`.
#-safe [DpAddrdR ISBdRW] [DpAddrdR ISBsRW] [DpAddrdW ISBdWW] [DpAddrdW ISBsWW] [DpAddrsR ISBdRW] [DpAddrsW ISBdWW]
# `[DpAddrdW ISBsWR]` is stronger than `[DpAddrdW PosWR]`.
#-safe [DpAddrdW ISBsWR]
-safe [DpAddrdR Amo.Swp ISBdWR] [DpAddrsR Amo.Swp ISBdWR]
-safe [DpAddrdR Amo.Cas ISBdWR] [DpAddrsR Amo.Cas ISBdWR]
-safe [DpAddrdR LxSx ISBdWR] [DpAddrsR LxSx ISBdWR]
# `[DpAddr*R rmw ISBsWR]` is stronger than `[DpAddr*R rmw PosWR]`
#-safe [DpAddrdR Amo.Swp ISBsWR] [DpAddrsR Amo.Swp ISBsWR]
#-safe [DpAddrdR Amo.Cas ISBsWR] [DpAddrsR Amo.Cas ISBsWR]
#-safe [DpAddrdR LxSx ISBsWR] [DpAddrsR LxSx ISBsWR]

# let IFB-ob = [Exp & R]; pick-addr-dep; [Exp & M]; po; [IFB]; po
-safe [DpAddrCseldR ISBdRR] [DpAddrCseldR ISBsRR] [DpAddrCseldW ISBdWR] [DpAddrCseldW ISBsWR] [DpAddrCselsR ISBdRR] [DpAddrCselsR ISBsRR] [DpAddrCselsW ISBdWR] [DpAddrCselsW ISBsWR]
# `[DpAddrCselsW ISBsWW] [DpAddrCselsR ISBsRW]` are stronger than `Pos*W` as the former are a read followed by a write to the same location.
#-safe [DpAddrCselsW ISBsWW] [DpAddrCselsR ISBsRW]
# `[DpAddrCsel** ISB**W]` is stronger than `[DpAddrCsel** Po**W]`; the latter can be combined by `diy`.
#-safe [DpAddrCseldR ISBdRW] [DpAddrCseldR ISBsRW] [DpAddrCseldW ISBdWW] [DpAddrCseldW ISBsWW] [DpAddrCselsR ISBdRW] [DpAddrCselsW ISBdWW]
-safe [DpAddrCseldR Amo.Swp ISBdWR] [DpAddrCseldR Amo.Swp ISBsWR] [DpAddrCselsR Amo.Swp ISBdWR] [DpAddrCselsR Amo.Swp ISBsRR]
-safe [DpAddrCseldR Amo.Cas ISBdWR] [DpAddrCseldR Amo.Cas ISBsWR] [DpAddrCselsR Amo.Swp ISBdWR] [DpAddrCselsR Amo.Swp ISBsRR]
-safe [DpAddrCseldR LxSx ISBdWR] [DpAddrCseldR LxSx ISBsWR] [DpAddrCselsR LxSx ISBdWR] [DpAddrCselsR LxSx ISBsRR]

# let pob = pick-addr-dep; [Exp & W | HU | TLBI | DC.CVAU | IC]
-safe DpAddrCseldW
# `DpAddrCselsW` is stronger than `Pos*W`.
#-safe DpAddrCselsW
-safe [DpAddrCseldR Amo.Swp] [DpAddrCseldR Amo.Cas] [DpAddrCseldR LxSx]

# let pob = pick-data-dep
-safe DpDataCseldW
# `DpDataCselsW` is stronger than `Pos*W`.
#-safe DpDataCselsW

# let pob = pick-ctrl-dep; [Exp & W | HU | TLBI | DC.CVAU | IC]
-safe DpCtrlCseldW
# `DpCtrlCselsW` is stronger than `Pos*W`.
#-safe DpCtrlCselsW
-safe [DpCtrlCseldR Amo.Swp] [DpCtrlCseldR Amo.Cas] [DpCtrlCseldR LxSx]

# let pob = pick-addr-dep; [Exp & M]; po; [Exp & W | HU]
-safe [DpAddrCseldR PodRW] [DpAddrCseldR PosRW] [DpAddrCseldW PodWW] [DpAddrCselsR PodRW] [DpAddrCselsW PodWW]
# `[DpAddrCselsW PosWW] [DpAddrCselsR PosRW]` are stronger than `Pos*W` as the former are a read followed by a write to the same location.
#-safe [DpAddrCselsW PosWW] [DpAddrCselsR PosRW]
#`[DpAddrCseldW PosWW]` can be combined by `diy`.
#-safe [DpAddrCseldW PosWW]
-safe [DpAddrCseldR Amo.Swp PodWW] [DpAddrCselsR Amo.Swp PodWW]
-safe [DpAddrCseldR Amo.Cas PodWW] [DpAddrCselsR Amo.Cas PodWW]
-safe [DpAddrCseldR LxSx PodWW] [DpAddrCselsR LxSx PodWW]
# `[DpAddrCseldR rmw PosWW]` can be combined by `diy` as `[DpAddrCseldR rmw]` and `PosWW`
-safe [DpAddrCseldR PodRR Amo.Swp] [DpAddrCseldR PosRR Amo.Swp] [DpAddrCseldW PodWR Amo.Swp] [DpAddrCseldW PosWR Amo.Swp] [DpAddrCselsR PodRR Amo.Swp] [DpAddrCselsW PodWR Amo.Swp]
-safe [DpAddrCseldR PodRR Amo.Cas] [DpAddrCseldR PosRR Amo.Cas] [DpAddrCseldW PodWR Amo.Cas] [DpAddrCseldW PosWR Amo.Cas] [DpAddrCselsR PodRR Amo.Cas] [DpAddrCselsW PodWR Amo.Cas]
-safe [DpAddrCseldR PodRR LxSx] [DpAddrCseldR PosRR LxSx] [DpAddrCseldW PodWR LxSx] [DpAddrCseldW PosWR LxSx] [DpAddrCselsR PodRR LxSx] [DpAddrCselsW PodWR LxSx]
# `[DpAddrCsels* Pos*R rmw]` is stronger than `Pos*W`.
-safe [DpAddrCseldR Amo.Swp PodWR Amo.Swp] [DpAddrCseldR Amo.Swp PodWR Amo.Cas] [DpAddrCseldR Amo.Swp PodWR LxSx] [DpAddrCseldR Amo.Swp PosWR Amo.Swp] [DpAddrCseldR Amo.Swp PosWR Amo.Cas] [DpAddrCseldR Amo.Swp PosWR LxSx]
-safe [DpAddrCselsR Amo.Swp PodWR Amo.Swp] [DpAddrCselsR Amo.Swp PodWR Amo.Cas] [DpAddrCselsR Amo.Swp PodWR LxSx]
-safe [DpAddrCseldR Amo.Cas PodWR Amo.Swp] [DpAddrCseldR Amo.Cas PodWR Amo.Cas] [DpAddrCseldR Amo.Cas PodWR LxSx] [DpAddrCseldR Amo.Cas PosWR Amo.Swp] [DpAddrCseldR Amo.Cas PosWR Amo.Cas] [DpAddrCseldR Amo.Cas PosWR LxSx]
-safe [DpAddrCselsR Amo.Cas PodWR Amo.Swp] [DpAddrCselsR Amo.Cas PodWR Amo.Cas] [DpAddrCselsR Amo.Cas PodWR LxSx]
-safe [DpAddrCseldR LxSx PodWR Amo.Swp] [DpAddrCseldR LxSx PodWR Amo.Cas] [DpAddrCseldR LxSx PodWR LxSx] [DpAddrCseldR LxSx PosWR Amo.Swp] [DpAddrCseldR LxSx PosWR Amo.Cas] [DpAddrCseldR LxSx PosWR LxSx]
-safe [DpAddrCselsR LxSx PodWR Amo.Swp] [DpAddrCselsR LxSx PodWR Amo.Cas] [DpAddrCselsR LxSx PodWR LxSx]
# `[DpAddrCselsR rmw PosWR rmw]` is stronger than `Pos*W`

### Fence

# let bob = [Exp & M | Imp & Tag & R]; po; [dmb.full]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
# DMB.ISH*** DMB.OSH*** in `-moreedges` in `diy7`; these two edges also satisfy `dmb.full`
-safe DMB.SYd** DMB.SYs*R
# `DMB.SYs*W` is stronger than `Pos*W`.
#-safe DMB.SYs*W

# let bob = [Exp & (R \ NoRet) | Imp & Tag & R]; po; [dmb.ld]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
-safe DMB.LDdR* DMB.LDsRR
# `DMB.LDsRW` is stronger than `Pos*W`.
#-safe DMB.LDsRW
-safe [Amo.Swp DMB.LDdW*] [Amo.Cas DMB.LDdW*] [LxSx DMB.LDdW*]
-safe [Amo.Swp DMB.LDsWR] [Amo.Cas DMB.LDsWR] [LxSx DMB.LDsWR]
# `[DMB.LD*R* rmw]` can be combined by `diy`

# let bob = [Exp & W]; po; [dmb.st]; po; [Exp & W | MMU & FAULT]
-safe DMB.STdWW
# `DMB.STsWW` is stronger than `Pos*W`.
#-safe DMB.STsWW
-safe [DMB.STdWR Amo.Swp] [DMB.STdWR Amo.Cas] [DMB.STdWR LxSx]

# let DSB-ob = [M | DC.CVAU | IC]; po; [dsb.full]; po; [~(Imp & TTD & M | Imp & Instr & R)]
# DSB.ISH*** DSB.OSH*** in `-moreedges` in `diy7`; these two edges also satisfy `dsb.full`
-safe DSB.SYd** DSB.SYs*R
# `DSB.SYs*W` is stronger than `Pos*W`.
#-safe DSB.SYs*W

# let DSB-ob = [(Exp & R) \ NoRet | Imp & Tag & R]; po; [dsb.ld]; po; [~(Imp & TTD & M | Imp & Instr & R)]
-safe DSB.LDdR* DSB.LDsRR
# `DSB.LDsRW` is stronger than `Pos*W`.
#-safe DSB.LDsRW
-safe [Amo.Swp DSB.LDdW*] [Amo.Cas DSB.LDdW*] [LxSx DSB.LDdW*]
-safe [Amo.Swp DSB.LDsWR] [Amo.Cas DSB.LDsWR] [LxSx DSB.LDsWR]

# let DSB-ob = [Exp & W]; po; [dsb.st]; po; [~(Imp & TTD & M | Imp & Instr & R)]
-safe DSB.STdW* DSB.STsWR
# `DSB.STsWW` is stronger than `Pos*W`.
#-safe DSB.STsWW

### Acquire-Release load and store
# let bob = [L]; po; [A]
-safe [L PodWR A] [L PosWR A]
# `[(rmw) L Po*WR A (rmw)]` can be combined by `diy`

### Atomic operation
# Amo.Swp
# Amo.Cas
# Amo.LdAdd Amo.LdClr Amo.LdEor Amo.LdSet Amo.LdSmax Amo.LdSmin Amo.LdUmax Amo.LdUmin
# Amo.StAdd Amo.StClr Amo.StEor Amo.StSet
# There is a known problem for `Amo.Ld*` and `Amo.St*` relaxations,
# because commutative of those relaxations leads to value collision.
# For this reason, these relaxations are not included.

# let bob = [A | Q]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
-safe [A PodR*] [A PosRR] [Q PodR*] [Q PosRR]
# `[A|Q PosRW]` is stronger than `PosRW`
#-safe [A PosRW] [Q PosRW]
# An acquire atomic operation followed by a memory access also matches above
-safe [A Amo.Swp PodW*] [A Amo.Swp PosWR]
-safe [A Amo.Cas PodW*] [A Amo.Cas PosWR]
-safe [A LxSx PodW*] [A LxSx PosWR]
#[A|Q rmw PosWW] is stronger than `Pos*W`
#-safe [A Amo.Swp PosWW] [A Amo.Cas PosWW] [Q Amo.Swp PosWW] [Q Amo.Cas PosWW] [A LxSx PosWW] [Q LxSx PosWW]

# let bob = [Exp & M | Imp & Tag & R]; po; [L]
-safe [Pod*W L]
# `[Pos*W L]` is stronger than `Pos*W`
# -safe [Pos*W L]
# A memory access followed by a release atomic operation also matches above.
-safe [Pod*R Amo.Swp L]
-safe [Pod*R Amo.Cas L]
-safe [Pod*R LxSx L]
# `[Pos*R rmw L]` is stronger than `Pos*W`
#-safe [Pos*R Amo.Swp L] [Pos*R Amo.Cas L] [Pos*R LxSx L]

# let aob = [Exp & M]; rmw; [Exp & M]
-safe LxSx Amo.Swp Amo.Cas

# le aob = [Exp & M]; rmw; lrs; [A | Q]
# let lrs = [W]; ((po & same-loc) & ~(intervening(W,(po & same-loc)))); [R]
-safe [LxSx PosWR A] [Amo.Swp PosWR A] [Amo.Cas PosWR A]
-safe [LxSx PosWR Q] [Amo.Swp PosWR Q] [Amo.Cas PosWR Q]

#let bob = [range([A];amo;[L])]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
# This relation cannot be directly mapped to a relaxation in `diy`,
# however, the individual `amo` relation is a suset of `rmw`, and is in `aob`,
# which means it is ordered.
# For this reason, here, we map
# `[A]; amo; [range([A];amo;[L])]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]`
-safe [A Amo.Swp L PodW*] [A Amo.Swp L PosWR]
-safe [A Amo.Cas L PodW*] [A Amo.Cas L PosWR]
-safe [A LxSx L PodW*] [A LxSx L PosWR]
# `[A rmw L PosWW]` is stronger than `Pos*W`
#-safe [A Amo.Swp L PosWW] [A Amo.Cas L PosWW] [A LxSx L PosWW]

# let bob = [Exp & M | Imp & Tag & R]; po; [L] for `Pos*** A Amo.* L` Note that `A` is irrelevant
# then let [range([A];amo;[L])]; po; [Exp & M | Imp & Tag & R | MMU & FAULT] for `A Amo.* L Po***`
# This particular edges cannot be auto generated from other safe edges.
-safe [Pod*R A Amo.Swp L PodW*] [Pod*R A Amo.Swp L PosW*] [Pos*R A Amo.Swp L PodW*] [Pos*R A Amo.Swp L PosW*]
-safe [Pod*R A Amo.Cas L PodW*] [Pod*R A Amo.Cas L PosW*] [Pos*R A Amo.Cas L PodW*] [Pos*R A Amo.Cas L PosW*]

### Hat
# `Hat` is an a read-read communication edge in `diy`, namely
# the end of a thread and the beginning of antoher thread are both read events
# and they will read the same value.
###
-safe [Hat Fre]
-safe [Hat DpAddrdR] [Hat DpAddrdW]
-safe [Hat DpDatadW]
-safe [Hat DpCtrldW]
-safe [Hat DMB.SYdR*]
-safe [Hat DSB.SYdR*]
-safe [Hat DMB.LDdR*]
-safe [Hat DSB.LDdR*]
-safe [Hat A PodR*] [Hat Q PodR*]
-safe [Hat Amo.Swp] [Hat Amo.Cas] [Hat LxSx]

### Note for consuming the generated tests
# When verifying all the generated tests are indeed forbidden via `herd7`,
# `LxSx` and its variants take more time for `herd7` to simulate due to loop.
# It recommends pass `-unroll 0` to `herd7` for better performance.
###
