-arch AArch64
-nprocs 2
-size 5
# the generate file name is in format `Armv8-ext-forbidden******.litmus`,
# where `******` are 6 digit numbers.
-name Armv8-ext-forbidden
-fmt 6
# present value in hex
-hexa
# If only want to generate cycles rather than litmus tests
#-cycleonly true

# If any relax input present, the cycles or litmus tests will contain at least one relaxation
#-relax {RELAX_LIST}

-safe Rfe Fre Coe
### Data and address dependance
-safe DpAddrdR DpAddrdW DpAddrsR DpAddrsW DpDatadW DpDatasW DpCtrldW DpCtrlsW DpCtrlIsbdR DpCtrlIsbsR
-safe [DpAddrdR, ISBd*R] [DpAddrdW, ISBd*R] [DpAddrsR, ISBs*R] [DpAddrsW, ISBs*R] [DpAddrsR, ISBd*R]
-safe [DpAddrsW, ISBd*R] [DpAddrdR, ISBs*R] [DpAddrdW, ISBs*R]
-safe [DpAddrdR, Pod*W] [DpAddrdW, Pod*W] [DpAddrsR, Pos*W] [DpAddrsW, Pos*W]
-safe [DpAddrsR, Pod*W] [DpAddrsW, Pod*W] [DpAddrdR, Pos*W] [DpAddrdW, Pos*W]
-safe [DpAddrdW, Rfi] [DpDatadW, Rfi] [DpAddrsW, Rfi] [DpDatasW, Rfi]
### Fence
-safe DMB.SYd** DMB.SYs**
-safe DMB.LDdR* DMB.LDsR*
-safe DMB.STdWW DMB.STsWW
### Acquire-Release load and store
-safe PodWRLA PosWRLA
-safe PodR*AP PodR*QP PodRRAA PodRRQA PodRRAQ PodRRQQ PodRWAL PodRWQL Pod*WPL PodWWLL
-safe PosR*AP PosR*QP PosRRAA PosRRQA PosRRAQ PosRRQQ PosRWAL PosRWQL Pos*WPL PosWWLL Pos*W
### Read modify write
# SWP and CAS
-safe Amo.Swp Amo.Cas
-safe Amo.SwpAP Amo.CasAP
-safe Amo.SwpPL Amo.CasPL
-safe Amo.SwpAL Amo.CasAL
-safe [Amo.Swp, RfiPA] [Amo.Cas, RfiPA]
-safe [Amo.Swp, RfiPQ] [Amo.Cas, RfiPQ]
-safe [Amo.SwpAP, RfiPA] [Amo.CasAP, RfiPA]
-safe [Amo.SwpAP, RfiPQ] [Amo.CasAP, RfiPQ]
-safe [Amo.SwpPL, RfiLA] [Amo.CasPL, RfiLA]
-safe [Amo.SwpPL, RfiLQ] [Amo.CasPL, RfiLQ]
-safe [Amo.SwpAL, RfiLA] [Amo.CasAL, RfiLA]
-safe [Amo.SwpAL, RfiLQ] [Amo.CasAL, RfiLQ]
-safe [Pod**, Amo.SwpAL] [Pod**, Amo.CasAL]
-safe [Pos**, Amo.SwpAL] [Pos**, Amo.CasAL]
-safe [Amo.SwpAL, Pod**] [Amo.CasAL, Pod**]
-safe [Amo.SwpAL, Pos**] [Amo.CasAL, Pos**]
-safe [Pod**, Amo.SwpAL, Pod**] [Pod**, Amo.CasAL, Pod**]
-safe [Pos**, Amo.SwpAL, Pos**] [Pos**, Amo.CasAL, Pos**]
# Ld with bitwise
-safe Amo.LdAdd Amo.LdEor Amo.LdClr Amo.LdSet
-safe Amo.LdAddAP Amo.LdEorAP Amo.LdClrAP Amo.LdSetAP
-safe Amo.LdAddPL Amo.LdEorPL Amo.LdClrPL Amo.LdSetPL
-safe Amo.LdAddAL Amo.LdEorAL Amo.LdClrAL Amo.LdSetAL
-safe [Amo.LdAdd, RfiPA] [Amo.LdEor, RfiPA] [Amo.LdClr, RfiPA] [Amo.LdSet, RfiPA]
-safe [Amo.LdAdd, RfiPQ] [Amo.LdEor, RfiPQ] [Amo.LdClr, RfiPQ] [Amo.LdSet, RfiPQ]
-safe [Amo.LdAddAP, RfiPA] [Amo.LdEorAP, RfiPA] [Amo.LdClrAP, RfiPA] [Amo.LdSetAP, RfiPA]
-safe [Amo.LdAddAP, RfiPQ] [Amo.LdEorAP, RfiPQ] [Amo.LdClrAP, RfiPQ] [Amo.LdSetAP, RfiPQ]
-safe [Amo.LdAddPL, RfiLA] [Amo.LdEorPL, RfiLA] [Amo.LdClrPL, RfiLA] [Amo.LdSetPL, RfiLA]
-safe [Amo.LdAddPL, RfiLQ] [Amo.LdEorPL, RfiLQ] [Amo.LdClrPL, RfiLQ] [Amo.LdSetPL, RfiLQ]
-safe [Amo.LdAddAL, RfiLA] [Amo.LdEorAL, RfiLA] [Amo.LdClrAL, RfiLA] [Amo.LdSetAL, RfiLA]
-safe [Amo.LdAddAL, RfiLQ] [Amo.LdEorAL, RfiLQ] [Amo.LdClrAL, RfiLQ] [Amo.LdSetAL, RfiLQ]
-safe [Pod**, Amo.LdAddAL] [Pod**, Amo.LdEorAL] [Pod**, Amo.LdClrAL] [Pod**, Amo.LdSetAL]
-safe [Pos**, Amo.LdAddAL] [Pos**, Amo.LdEorAL] [Pos**, Amo.LdClrAL] [Pos**, Amo.LdSetAL]
-safe [Amo.LdAddAL, Pod**] [Amo.LdEorAL, Pod**] [Amo.LdClrAL, Pod**] [Amo.LdSetAL, Pod**]
-safe [Amo.LdAddAL, Pos**] [Amo.LdEorAL, Pos**] [Amo.LdClrAL, Pos**] [Amo.LdSetAL, Pos**]
-safe [Pod**, Amo.LdAddAL, Pod**] [Pod**, Amo.LdEorAL, Pod**] [Pod**, Amo.LdClrAL, Pod**] [Pod**, Amo.LdSetAL, Pod**]
-safe [Pos**, Amo.LdAddAL, Pos**] [Pos**, Amo.LdEorAL, Pos**] [Pos**, Amo.LdClrAL, Pos**] [Pos**, Amo.LdSetAL, Pos**]
# Ld with min max
-safe Amo.LdSmax Amo.LdUmax Amo.LdSmin Amo.LdUmin
-safe Amo.LdSmaxAP Amo.LdUmaxAP Amo.LdSminAP Amo.LdUminAP
-safe Amo.LdSmaxPL Amo.LdUmaxPL Amo.LdSminPL Amo.LdUminPL
-safe Amo.LdSmaxAL Amo.LdUmaxAL Amo.LdSminAL Amo.LdUminAL
-safe [Amo.LdSmax, RfiPA] [Amo.LdUmax, RfiPA] [Amo.LdSmin, RfiPA] [Amo.LdUmin, RfiPA]
-safe [Amo.LdSmax, RfiPQ] [Amo.LdUmax, RfiPQ] [Amo.LdSmin, RfiPQ] [Amo.LdUmin, RfiPQ]
-safe [Amo.LdSmaxAP, RfiPA] [Amo.LdUmaxAP, RfiPA] [Amo.LdSminAP, RfiPA] [Amo.LdUminAP, RfiPA]
-safe [Amo.LdSmaxAP, RfiPQ] [Amo.LdUmaxAP, RfiPQ] [Amo.LdSminAP, RfiPQ] [Amo.LdUminAP, RfiPQ]
-safe [Amo.LdSmaxPL, RfiLA] [Amo.LdUmaxPL, RfiLA] [Amo.LdSminPL, RfiLA] [Amo.LdUminPL, RfiLA]
-safe [Amo.LdSmaxPL, RfiLQ] [Amo.LdUmaxPL, RfiLQ] [Amo.LdSminPL, RfiLQ] [Amo.LdUminPL, RfiLQ]
-safe [Amo.LdSmaxAL, RfiLA] [Amo.LdUmaxAL, RfiLA] [Amo.LdSminAL, RfiLA] [Amo.LdUminAL, RfiLA]
-safe [Amo.LdSmaxAL, RfiLQ] [Amo.LdUmaxAL, RfiLQ] [Amo.LdSminAL, RfiLQ] [Amo.LdUminAL, RfiLQ]
-safe [Pod**, Amo.LdSmaxAL] [Pod**, Amo.LdUmaxAL] [Pod**, Amo.LdSminAL] [Pod**, Amo.LdUminAL]
-safe [Pos**, Amo.LdSmaxAL] [Pos**, Amo.LdUmaxAL] [Pos**, Amo.LdSminAL] [Pos**, Amo.LdUminAL]
-safe [Amo.LdSmaxAL, Pod**] [Amo.LdUmaxAL, Pod**] [Amo.LdSminAL, Pod**] [Amo.LdUminAL, Pod**]
-safe [Amo.LdSmaxAL, Pos**] [Amo.LdUmaxAL, Pos**] [Amo.LdSminAL, Pos**] [Amo.LdUminAL, Pos**]
-safe [Pod**, Amo.LdSmaxAL, Pod**] [Pod**, Amo.LdUmaxAL, Pod**] [Pod**, Amo.LdSminAL, Pod**] [Pod**, Amo.LdUminAL, Pod**]
-safe [Pos**, Amo.LdSmaxAL, Pos**] [Pos**, Amo.LdUmaxAL, Pos**] [Pos**, Amo.LdSminAL, Pos**] [Pos**, Amo.LdUminAL, Pos**]
# St with bitwise
-safe Amo.StAdd Amo.StEor Amo.StClr Amo.StSet
-safe Amo.StAddPL Amo.StEorPL Amo.StClrPL Amo.StSetPL
-safe [Amo.StAdd, RfiPA] [Amo.StEor, RfiPA] [Amo.StClr, RfiPA] [Amo.StSet, RfiPA]
-safe [Amo.StAdd, RfiPQ] [Amo.StEor, RfiPQ] [Amo.StClr, RfiPQ] [Amo.StSet, RfiPQ]
-safe [Amo.StAddPL, RfiLA] [Amo.StEorPL, RfiLA] [Amo.StClrPL, RfiLA] [Amo.StSetPL, RfiLA]
-safe [Amo.StAddPL, RfiLQ] [Amo.StEorPL, RfiLQ] [Amo.StClrPL, RfiLQ] [Amo.StSetPL, RfiLQ]
### Load-exclusive and store-exclusive,
# LxSx and its variants take more time for `herd7` to simulate due to loop.
# It recommends pass `-unroll 0` to `herd7` for better performance.
-safe LxSx LxSxAP LxSxPL LxSxAL [LxSx, RfiPA] [LxSx, RfiPQ] [LxSxAP, RfiPA] [LxSxAP, RfiPQ] [LxSxPL, RfiLA] [LxSxPL, RfiLQ] [LxSxAL, RfiLA] [LxSxAL, RfiLQ]
### Hat
# Restrict `hat` between plain memory access.
-safe [P Hat Fre P] [P Hat Fre L]
-safe [A Hat Fre P] [A Hat Fre L]
-safe [Q Hat Fre P] [Q Hat Fre L]
-safe [Hat Amo.Swp]
-safe [P Hat DpAddrdR P] [P Hat DpAddrdW P] [P Hat DpDatadW P] [P Hat DpAddrsR P] [P Hat DpAddrsW P] [P Hat DpDatasW P]
-safe [A Hat DpAddrdR P] [A Hat DpAddrdW P] [A Hat DpDatadW P] [A Hat DpAddrsR P] [A Hat DpAddrsW P] [A Hat DpDatasW P]
-safe [Q Hat DpAddrdR P] [Q Hat DpAddrdW P] [Q Hat DpDatadW P] [Q Hat DpAddrsR P] [Q Hat DpAddrsW P] [Q Hat DpDatasW P]
-safe [P Hat DpAddrdR A] [P Hat DpAddrdW L] [P Hat DpDatadW L] [P Hat DpAddrsR A] [P Hat DpAddrsW L] [P Hat DpDatasW L]
-safe [A Hat DpAddrdR A] [A Hat DpAddrdW L] [A Hat DpDatadW L] [A Hat DpAddrsR A] [A Hat DpAddrsW L] [A Hat DpDatasW L]
-safe [Q Hat DpAddrdR A] [Q Hat DpAddrdW L] [Q Hat DpDatadW L] [Q Hat DpAddrsR A] [Q Hat DpAddrsW L] [Q Hat DpDatasW L]
-safe [P Hat DMB.SYd** P] [P Hat DMB.SYs** P] [P Hat DMB.LDdR* P] [P Hat DMB.LDsR* P]
-safe [A Hat DMB.SYd** P] [A Hat DMB.SYs** P] [A Hat DMB.LDdR* P] [A Hat DMB.LDsR* P]
-safe [Q Hat DMB.SYd** P] [Q Hat DMB.SYs** P] [Q Hat DMB.LDdR* P] [Q Hat DMB.LDsR* P]
-safe [P Hat DMB.SYd** A] [P Hat DMB.SYs** A] [P Hat DMB.LDdR* A] [P Hat DMB.LDsR* A]
-safe [A Hat DMB.SYd** A] [A Hat DMB.SYs** A] [A Hat DMB.LDdR* A] [A Hat DMB.LDsR* A]
-safe [Q Hat DMB.SYd** A] [Q Hat DMB.SYs** A] [Q Hat DMB.LDdR* A] [Q Hat DMB.LDsR* A]
-safe [P Hat DMB.SYd** L] [P Hat DMB.SYs** L] [P Hat DMB.LDdR* L] [P Hat DMB.LDsR* L]
-safe [A Hat DMB.SYd** L] [A Hat DMB.SYs** L] [A Hat DMB.LDdR* L] [A Hat DMB.LDsR* L]
-safe [Q Hat DMB.SYd** L] [Q Hat DMB.SYs** L] [Q Hat DMB.LDdR* L] [Q Hat DMB.LDsR* L]
-safe [P Hat A PodR* P] [P Hat Q PodR* P]
-safe [A Hat A PodR* P] [A Hat Q PodR* P]
-safe [Q Hat A PodR* P] [Q Hat Q PodR* P]
-safe [P Hat A PodR* A] [P Hat Q PodR* A]
-safe [A Hat A PodR* A] [A Hat Q PodR* A]
-safe [Q Hat A PodR* A] [Q Hat Q PodR* A]
-safe [P Hat A PodR* L] [P Hat Q PodR* L]
-safe [A Hat A PodR* L] [A Hat Q PodR* L]
-safe [Q Hat A PodR* L] [Q Hat Q PodR* L]
