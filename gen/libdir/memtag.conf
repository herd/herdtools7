####################### BELOW IS GOOD
# A variant of `dob` where the communication is altered with `Tag-obs`.
# This means we are modelling, `[dob; Tag-obs]`, which allowed the litmus tests
# introduce a tag update, hence make the litmus tests relevant.
###
# In particular, we model tag-write followed by a normal write,
# let Tag-obs = [Exp & W]; rf & ext; [Imp & Tag & R]
# which correspond to `T,Coe`.
# Note that `T Rfe` will not work despite it satisfies `Tag-obs`.
# This is because:
# - `let tc-ib = tc-before; [~(Exp & R)]`, which EXCLUDES `Exp & R`,
# - `Rfe` ends with a `Exp & R`,
# which means no cycle.
###
# let ctrl = [Exp & R]; basic-dep; [BCC]; po
# let dob = ctrl; [Exp & W | HU | TLBI | DC.CVAU | IC]
-relax [DpCtrldW T Coe]
# let dob = addr
-relax [DpAddr T Coe]
# let dob = addr; [Exp & M]; po; [Exp & W | HU]
-relax [DpAddr Pod*W T Coe] [DpAddrd* Pos*W T Coe]

# Similar to `dob` with `Tag-obs`, we model `[pob; Tag-obs]`
# let pob = pick-addr-dep; [Exp & W | HU | TLBI | DC.CVAU | IC]
-relax [DpAddrCseldW T Coe]
# let pob = pick-data-dep
-relax [DpDataCseldW T Coe]
# let pob = pick-ctrl-dep; [Exp & W | HU | TLBI | DC.CVAU | IC]
-relax [DpCtrlCseldW T Coe]
# let pob = pick-addr-dep; [Exp & M]; po; [Exp & W | HU]
-relax [DpAddrCsel Pod*W T Coe] [DpAddrCseld* Pos*W T Coe]

# Similar to `dob` with `Tag-obs`, we model `[bob; Tag-obs]`
# let bob = [Exp & M | Imp & Tag & R]; po; [dmb.full]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
-relax [ExpObs DMB.SYd**|DMB.SYs*R T Coe]
# let bob = [Exp & (R \ NoRet) | Imp & Tag & R]; po; [dmb.ld]; po; [Exp & M | Imp & Tag & R | MMU & FAULT]
-relax [DMB.LDdR* T Coe]
# let bob = [Exp & W]; po; [dmb.st]; po; [Exp & W | MMU & FAULT]
-relax [DMB.STdWW T Coe]

# Similar to `dob` with `Tag-obs`, we model `[DSB-ob; Tag-obs]`
# let DSB-ob = [M | DC.CVAU | IC]; po; [dsb.full]; po; [~(Imp & TTD & M | Imp & Instr & R)]
-relax [ExpObs DSB.SYd**|DSB.SYs*R T Coe]
# let DSB-ob = [(Exp & R) \ NoRet | Imp & Tag & R]; po; [dsb.ld]; po; [~(Imp & TTD & M | Imp & Instr & R)]
-relax [DSB.LDdR*|DSB.LDsRR T Coe]
# let DSB-ob = [Exp & W]; po; [dsb.st]; po; [~(Imp & TTD & M | Imp & Instr & R)]
-relax [DSB.STdW*|DSB.STsWR T Coe]

# Tag-obs + new dob particular for memtag
#let tc-before = [Imp & Tag & R]; iico_data; [B]; iico_ctrl; [Exp & M | TagCheck & FAULT]
#let dob = [Imp & Tag & R]; tc-before; [Exp & M]; po; [Exp & W | HU]
-relax [T Coe Po**W]
# TODO
# -relax [T Rfe Po**W] does not work due to annotation `T` mess up with `Pos*W` on SAME LOCATION

# let lmrs = [W]; ((po & same-loc) & ~(intervening(W,(po & same-loc)))); [R]
# let dob = addr; [Exp & M]; lmrs; [Exp & R | Imp & Tag & R]
-relax [DpAddr*W PosWR Rfe T]
# let dob = data; [Exp & M]; lmrs; [Exp & R | Imp & Tag & R]
-relax [DpData*W PosWR Rfe T]

#let tc-before = [Imp & Tag & R]; iico_data; [B]; iico_ctrl; [Exp & M | TagCheck & FAULT]
#let tc-ib = tc-before; [~(Exp & R)]
# -relax [T Rfe ISB*** @after([T Coe]|ExpObs|Hat)] does not work due to annotation `T` mess up with `Pos*W` on SAME LOCATION
-relax [T Coe ISB*** @after([T Coe]|ExpObs|Hat)]
# TODO
#let IFB-ob = [Imp & Tag & R]; tc-ib; [IFB]; po

# let addr = [Exp & R]; dtrm & po; [Rreg]; iico_data & ii_addr; [Imp & Tag & R]
# let dob = addr
-relax [DpAddr Fre T]
